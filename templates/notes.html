{% extends 'base.html' %}

{% block content %}

<h2>Notes</h2>

<div class="card">

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Add Note
        </button>

    </form>

</div>

{% for note in notes %}

    <div class="card">

        <h3>{{ note.title }}</h3>

        <p>{{ note.content }}</p>

        <small>Subject: {{ note.subject.name }}</small>

    </div>

{% empty %}

    <p>No notes added yet.</p>

{% endfor %}

{% endblock %}

{% extends 'base.html' %}

{% block content %}

<h2>Today's Tasks</h2>

{% for task in tasks %}

    <div class="card">

        <strong>{{ task.title }}</strong>

        <p>
            {{ task.subject.name }} <br>
            Due: {{ task.due_date }} <br>
            Priority: {{ task.priority }}
        </p>

    </div>

{% empty %}

    <div class="card">
        No tasks today
    </div>

{% endfor %}

{% endblock %}

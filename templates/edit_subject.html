{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h2>Edit Subject</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Subject Name</label>

        <input type="text"
               name="name"
               value="{{ subject.name }}">

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

{% endblock %}

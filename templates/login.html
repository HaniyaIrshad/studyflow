{% extends 'base.html' %}

{% block content %}

<div class="card" style="max-width: 450px; margin: 50px auto; text-align: center;">

    <h2>Login</h2>

    <form method="POST">

        {% csrf_token %}

        <div style="text-align: left;">
            {{ form.as_p }}
        </div>

        <button type="submit" style="width: 100%;">
            Login
        </button>

    </form>

</div>

{% endblock %}

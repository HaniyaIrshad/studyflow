{% extends 'base.html' %}

{% block content %}

<div class="card auth-card">

    <h2>Create Account</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="form-left">
            {{ form.as_p }}
        </div>

        <button type="submit" class="full-btn">
            Signup
        </button>

    </form>

</div>

{% endblock %}

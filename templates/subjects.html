{% extends 'base.html' %}

{% block content %}

<h2>Your Subjects</h2>

<div class="card">

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Add Subject
        </button>

    </form>

</div>

{% for subject in subjects %}

    <div class="card">

        <h3>{{ subject.name }}</h3>

        <div class="task-actions">

            <a href="{% url 'edit_subject' subject.id %}">
                Edit
            </a>

            <a href="{% url 'delete_subject' subject.id %}">
                Delete
            </a>

        </div>

    </div>

{% empty %}

    <p>No subjects added yet.</p>

{% endfor %}

{% endblock %}

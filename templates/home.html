{% extends 'base.html' %}

{% block content %}

<div class="card home-hero">

    <h1>StudyFlow</h1>

    <p class="subtitle">
        Manage your study life efficiently. Organize tasks, track progress, and stay consistent every day.
    </p>

    {% if user.is_authenticated %}

        <a href="{% url 'dashboard' %}">
            <button>Go to Dashboard</button>
        </a>

    {% else %}

        <div class="home-actions">

            <a href="{% url 'login' %}">
                <button>Login to Continue</button>
            </a>

            <a href="{% url 'signup' %}">
                <button class="secondary-btn">Create Account</button>
            </a>

        </div>

    {% endif %}

</div>

{% endblock %}
